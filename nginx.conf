# ── EulenAI – Nginx Configuration ──────────────────────────────
# Alles geht über den Gateway-Server auf Port 3000.
# Thai-Game und Mix-Trainer bleiben als eigene statische Locations.
# Datei: /etc/nginx/sites-enabled/eulenai

    # ── Thai Learning PWA (static) ─────────────────────────────
    # location /thai-game/ { ... }

    # ── Mix Trainer (static) ───────────────────────────────────
    # location /mix_trainer/ { ... }

    # ── EulenAI Gateway (handles auth + landing + sub-app proxy) ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
