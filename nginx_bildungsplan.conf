# Nginx-Konfiguration für /bildungsplan/ auf eulenai.de
# Diesen Block in den bestehenden server { listen 443 ssl; } Block einfügen:

    # Bildungsplan GENT Assistent (proxied to Node on 127.0.0.1:5001)
    location /bildungsplan/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;              # important for streaming/SSE
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Normalize no-trailing-slash path to trailing-slash
        rewrite ^/bildungsplan$ /bildungsplan/ permanent;
    }
