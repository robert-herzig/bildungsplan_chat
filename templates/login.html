<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Bildungsplan GENT Assistent</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #6366f1;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    .login-card .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid #334155;
      color: var(--text);
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #4f46e5; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      color: #f87171;
      text-align: center;
      margin-top: 12px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎓 Bildungsplan GENT</h1>
    <p class="subtitle">Bitte melde dich an, um den Assistenten zu nutzen.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Anmelden</button>
    </form>
    <p class="error-msg" id="errorMsg"></p>
  </div>

  <script>
    const BASE_PATH = (() => {
      const p = window.location.pathname;
      // Strip /login from path to get base
      const base = p.replace(/\/login\/?$/, '');
      return base || '';
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Wird angemeldet…';

      try {
        const r = await fetch(BASE_PATH + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = BASE_PATH + '/';
        } else {
          errEl.textContent = data.error || 'Anmeldung fehlgeschlagen.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Verbindungsfehler.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
