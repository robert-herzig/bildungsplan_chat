<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – EulenAI</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --card: #FFFFFF;
      --accent: #C9A84C;
      --accent-hover: #A88A30;
      --text: #111111;
      --muted: #888888;
      --border: #E0E0E0;
      --near-black: #1A1A1A;
      --gold-light: #F7F2E4;
      --danger: #CC0000;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-topbar {
      background: var(--near-black);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      border-bottom: 3px solid var(--accent);
    }
    .login-topbar a {
      color: #FFFFFF;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-topbar a img {
      width: 24px; height: 24px; object-fit: contain;
    }
    .login-topbar .gold { color: var(--accent); }
    .login-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .login-card .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px;
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.35);
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--near-black);
      border: none;
      border-radius: 2px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
      font-size: 0.9rem;
      display: none;
    }

    .skip-link {
      position: absolute; top: -100%; left: 0;
      background: #1A1A1A; color: #fff; padding: 8px 16px;
      z-index: 10000; font-size: 0.9rem;
      border-bottom: 2px solid var(--accent); text-decoration: none;
    }
    .skip-link:focus { top: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Zum Hauptinhalt springen</a>
  <nav class="login-topbar">
    <a href="/"><img src="/shared/static/img/euletranspa.png" alt="">Eulen<span class="gold">AI</span></a>
  </nav>
  <div class="login-center" id="main-content">
  <div class="login-card">
    <h1>🎓 Bildungsplan GENT</h1>
    <p class="subtitle">Bitte melde dich an, um den Assistenten zu nutzen.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Benutzername</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Anmelden</button>
    </form>
    <p class="error-msg" id="errorMsg" aria-live="polite"></p>
  </div>
  </div>

  <script>
    const BASE_PATH = (() => {
      const p = window.location.pathname;
      // Strip /login from path to get base
      const base = p.replace(/\/login\/?$/, '');
      return base || '';
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Wird angemeldet…';

      try {
        const r = await fetch(BASE_PATH + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          window.location.href = BASE_PATH + '/';
        } else {
          errEl.textContent = data.error || 'Anmeldung fehlgeschlagen.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Verbindungsfehler.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
